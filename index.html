<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Asistente">
<title>Asistente Personal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: #22222e;
    --accent: #c8f566;
    --accent-dim: rgba(200,245,102,0.12);
    --accent-glow: rgba(200,245,102,0.25);
    --red: #ff4f6d;
    --text: #e8e8f0;
    --muted: #5a5a72;
    --serif: 'DM Serif Display', Georgia, serif;
    --mono: 'DM Mono', monospace;
  }

  html, body {
    height: 100%; overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
  }

  /* Layout */
  .app {
    display: flex; flex-direction: column;
    height: 100dvh;
    max-width: 430px; margin: 0 auto;
    position: relative;
  }

  /* Header */
  .header {
    padding: 52px 24px 16px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .header-title {
    font-family: var(--serif);
    font-size: 1.5rem;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .header-title span { color: var(--accent); font-style: italic; }

  .settings-btn {
    width: 38px; height: 38px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px;
    transition: border-color 0.2s;
  }
  .settings-btn:active { border-color: var(--accent); }

  /* Status bar */
  .status-bar {
    margin: 0 24px 12px;
    padding: 8px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex; align-items: center; gap: 8px;
    font-size: 0.72rem; color: var(--muted);
    flex-shrink: 0;
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
    flex-shrink: 0;
  }
  .status-dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
  .status-dot.recording { background: var(--red); animation: pulse-red 1s infinite; }
  @keyframes pulse-red { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Chat area */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 8px 24px 16px;
    display: flex; flex-direction: column; gap: 12px;
    -webkit-overflow-scrolling: touch;
  }
  .chat::-webkit-scrollbar { display: none; }

  .msg {
    display: flex; flex-direction: column; gap: 4px;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

  .msg-label {
    font-size: 0.65rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0 4px;
  }
  .msg.user .msg-label { text-align: right; }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 0.88rem;
    line-height: 1.6;
    max-width: 88%;
  }
  .msg.user .msg-bubble {
    background: var(--accent-dim);
    border: 1px solid rgba(200,245,102,0.2);
    color: var(--accent);
    align-self: flex-end;
    border-bottom-right-radius: 4px;
    font-family: var(--mono);
  }
  .msg.assistant .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }

  .msg.system .msg-bubble {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--muted);
    font-size: 0.78rem;
    align-self: center;
    text-align: center;
    border-radius: 10px;
    max-width: 100%;
  }

  /* Thinking indicator */
  .thinking {
    display: flex; gap: 5px; align-items: center;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px; border-bottom-left-radius: 4px;
    align-self: flex-start;
  }
  .thinking span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted);
    animation: bounce 1.2s infinite;
  }
  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  /* Notes panel */
  .notes-panel {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg);
    z-index: 10;
    flex-direction: column;
    padding: 52px 24px 24px;
    gap: 16px;
  }
  .notes-panel.open { display: flex; }
  .notes-header {
    display: flex; align-items: center; justify-content: space-between;
  }
  .notes-title { font-family: var(--serif); font-size: 1.3rem; }
  .close-btn {
    width: 34px; height: 34px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px; color: var(--muted);
  }
  .notes-list {
    flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
  }
  .note-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px;
    font-size: 0.83rem; line-height: 1.6;
  }
  .note-item .note-time { font-size: 0.7rem; color: var(--muted); margin-bottom: 6px; }
  .note-item .note-text { color: var(--text); }
  .note-item .note-tag {
    display: inline-block; margin-top: 8px;
    font-size: 0.65rem; padding: 2px 8px; border-radius: 20px;
    background: var(--accent-dim); color: var(--accent);
    border: 1px solid rgba(200,245,102,0.2);
  }
  .empty-notes {
    text-align: center; color: var(--muted);
    font-size: 0.85rem; margin-top: 40px;
  }

  /* Bottom area */
  .bottom {
    flex-shrink: 0;
    padding: 12px 24px 34px;
    display: flex; flex-direction: column; gap: 12px;
  }

  /* Text input row */
  .input-row {
    display: flex; gap: 10px; align-items: flex-end;
  }
  .text-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.88rem;
    resize: none;
    outline: none;
    min-height: 46px;
    max-height: 100px;
    line-height: 1.5;
    -webkit-appearance: none;
    transition: border-color 0.2s;
  }
  .text-input:focus { border-color: rgba(200,245,102,0.4); }
  .text-input::placeholder { color: var(--muted); }

  .send-btn {
    width: 46px; height: 46px; flex-shrink: 0;
    background: var(--accent-dim);
    border: 1px solid rgba(200,245,102,0.3);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px;
    transition: all 0.2s;
  }
  .send-btn:active { background: rgba(200,245,102,0.25); }

  /* Mic button */
  .mic-area {
    display: flex; align-items: center; justify-content: center; gap: 16px;
  }

  .mic-btn {
    width: 72px; height: 72px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 28px;
    position: relative;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .mic-btn::before {
    content: '';
    position: absolute; inset: -4px;
    border-radius: 50%;
    border: 2px solid transparent;
    transition: border-color 0.2s;
  }
  .mic-btn.recording {
    border-color: var(--red);
    background: rgba(255,79,109,0.1);
    animation: mic-pulse 1.5s infinite;
  }
  .mic-btn.recording::before { border-color: rgba(255,79,109,0.3); }
  @keyframes mic-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,79,109,0.3)} 50%{box-shadow:0 0 0 12px rgba(255,79,109,0)} }

  .mic-hint { font-size: 0.72rem; color: var(--muted); text-align: center; }

  .notes-shortcut {
    width: 46px; height: 46px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 20px;
  }

  /* Settings modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    z-index: 20; align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    padding: 24px 24px 48px;
    width: 100%; max-width: 430px;
    display: flex; flex-direction: column; gap: 16px;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:none} }
  .modal h2 { font-family: var(--serif); font-size: 1.2rem; }
  .modal label { font-size: 0.78rem; color: var(--muted); display: block; margin-bottom: 6px; }
  .modal input, .modal textarea {
    width: 100%; background: var(--bg);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; color: var(--text);
    font-family: var(--mono); font-size: 0.83rem;
    outline: none; -webkit-appearance: none;
  }
  .modal textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
  .modal input:focus, .modal textarea:focus { border-color: rgba(200,245,102,0.4); }
  .save-btn {
    background: var(--accent); color: #0a0a0f;
    border: none; border-radius: 12px;
    padding: 14px; font-family: var(--mono);
    font-size: 0.88rem; font-weight: 500;
    cursor: pointer; width: 100%;
  }
  .divider { height: 1px; background: var(--border); }
</style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-title">Asistente <span>personal</span></div>
    <div class="settings-btn" onclick="openSettings()">⚙️</div>
  </div>

  <!-- Status -->
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Configura tu API key para empezar</span>
  </div>

  <!-- Chat -->
  <div class="chat" id="chat">
    <div class="msg system">
      <div class="msg-bubble">Toca ⚙️ para ingresar tu API key de Claude.<br>Luego habla o escribe lo que necesitas.</div>
    </div>
  </div>

  <!-- Bottom -->
  <div class="bottom">
    <!-- Text input -->
    <div class="input-row">
      <textarea class="text-input" id="textInput" placeholder="Escribe un mensaje o nota..." rows="1"
        oninput="autoResize(this)"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendText()}"></textarea>
      <div class="send-btn" onclick="sendText()">↑</div>
    </div>

    <!-- Mic area -->
    <div class="mic-area">
      <div class="notes-shortcut" onclick="openNotes()">📋</div>
      <div>
        <div class="mic-btn" id="micBtn" onclick="toggleRecording()">🎙️</div>
      </div>
      <div style="width:46px"></div>
    </div>
    <div class="mic-hint" id="micHint">Mantén presionado para grabar</div>
  </div>

  <!-- Notes Panel -->
  <div class="notes-panel" id="notesPanel">
    <div class="notes-header">
      <div class="notes-title">Mis notas</div>
      <div class="close-btn" onclick="closeNotes()">✕</div>
    </div>
    <div class="notes-list" id="notesList"></div>
  </div>

</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal" onclick="closeSettingsOutside(event)">
  <div class="modal">
    <h2>Configuración</h2>
    <div>
      <label>API Key de Claude (Anthropic)</label>
      <input type="password" id="apiKeyInput" placeholder="sk-ant-..." />
    </div>
    <div class="divider"></div>
    <div>
      <label>Tu nombre</label>
      <input type="text" id="nameInput" placeholder="Ismael" />
    </div>
    <div>
      <label>Contexto personal (quién eres, qué haces)</label>
      <textarea id="contextInput" placeholder="Soy ejecutivo de ventas en Unimares, empresa de pescados y mariscos en Ibagué. También tengo PatyHogar en Shopify..."></textarea>
    </div>
    <button class="save-btn" onclick="saveSettings()">Guardar y empezar</button>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────
let apiKey = localStorage.getItem('asistente_key') || '';
let userName = localStorage.getItem('asistente_name') || 'Ismael';
let userContext = localStorage.getItem('asistente_context') || '';
let history = JSON.parse(localStorage.getItem('asistente_history') || '[]');
let notes = JSON.parse(localStorage.getItem('asistente_notes') || '[]');
let isRecording = false;
let mediaRecorder = null;
let audioChunks = [];

// ─── Init ─────────────────────────────────────────────────
window.onload = () => {
  if (apiKey) {
    updateStatus('ready');
    // Restore last few messages
    if (history.length > 0) {
      const recent = history.slice(-6);
      recent.forEach(m => addBubble(m.role === 'user' ? 'user' : 'assistant', m.content, false));
    }
  } else {
    openSettings();
  }
  // Pre-fill settings
  document.getElementById('apiKeyInput').value = apiKey;
  document.getElementById('nameInput').value = userName;
  document.getElementById('contextInput').value = userContext;
};

// ─── Settings ─────────────────────────────────────────────
function openSettings() {
  document.getElementById('settingsModal').classList.add('open');
}
function closeSettingsOutside(e) {
  if (e.target === document.getElementById('settingsModal')) closeSettings();
}
function closeSettings() {
  document.getElementById('settingsModal').classList.remove('open');
}
function saveSettings() {
  apiKey = document.getElementById('apiKeyInput').value.trim();
  userName = document.getElementById('nameInput').value.trim() || 'Ismael';
  userContext = document.getElementById('contextInput').value.trim();
  localStorage.setItem('asistente_key', apiKey);
  localStorage.setItem('asistente_name', userName);
  localStorage.setItem('asistente_context', userContext);
  closeSettings();
  if (apiKey) {
    updateStatus('ready');
    addBubble('system', `Listo, ${userName}. Habla o escribe.`);
  }
}

// ─── Status ───────────────────────────────────────────────
function updateStatus(state, text) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'status-dot';
  if (state === 'ready') { dot.classList.add('active'); txt.textContent = text || `Listo · ${userName}`; }
  else if (state === 'recording') { dot.classList.add('recording'); txt.textContent = 'Grabando...'; }
  else if (state === 'thinking') { dot.classList.add('active'); txt.textContent = 'Pensando...'; }
  else { txt.textContent = text || 'Sin configurar'; }
}

// ─── Chat UI ──────────────────────────────────────────────
function addBubble(role, text, scroll = true) {
  const chat = document.getElementById('chat');
  const labels = { user: userName, assistant: 'Asistente', system: '' };
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (role !== 'system') {
    div.innerHTML = `<div class="msg-label">${labels[role]}</div><div class="msg-bubble">${text}</div>`;
  } else {
    div.innerHTML = `<div class="msg-bubble">${text}</div>`;
  }
  chat.appendChild(div);
  if (scroll) chat.scrollTop = chat.scrollHeight;
  return div;
}

function showThinking() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.id = 'thinking';
  div.className = 'thinking';
  div.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}
function hideThinking() {
  const el = document.getElementById('thinking');
  if (el) el.remove();
}

// ─── Send to Claude ───────────────────────────────────────
async function sendToClaude(userMsg) {
  if (!apiKey) { openSettings(); return; }

  addBubble('user', userMsg);
  history.push({ role: 'user', content: userMsg });
  showThinking();
  updateStatus('thinking');

  const systemPrompt = `Eres el asistente personal de ${userName}. Eres conciso, práctico y hablas en español colombiano natural.

Contexto del usuario: ${userContext || 'Ejecutivo de ventas, emprendedor digital en Ibagué, Colombia.'}

Puedes ayudar con:
- Tomar notas y recordatorios (cuando detectes una nota importante, termina tu respuesta con: [NOTA: texto de la nota])
- Responder preguntas rápidas
- Registro de visitas a clientes
- Ideas para negocios y ventas
- Cualquier cosa que el usuario necesite

Sé directo y útil. Si el usuario va manejando, responde de forma muy breve y clara.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 600,
        system: systemPrompt,
        messages: history.slice(-12)
      })
    });

    const data = await response.json();
    hideThinking();

    if (data.error) throw new Error(data.error.message);

    const reply = data.content[0].text;

    // Detect and save notes
    const noteMatch = reply.match(/\[NOTA:\s*(.+?)\]/s);
    if (noteMatch) {
      const noteText = noteMatch[1].trim();
      saveNote(noteText, 'auto');
      const cleanReply = reply.replace(/\[NOTA:.+?\]/s, '').trim();
      addBubble('assistant', cleanReply + '\n\n📋 <em>Nota guardada.</em>');
    } else {
      addBubble('assistant', reply);
    }

    history.push({ role: 'assistant', content: reply });
    localStorage.setItem('asistente_history', JSON.stringify(history.slice(-40)));
    updateStatus('ready');

    // Speak response if short
    if (reply.length < 200 && 'speechSynthesis' in window) {
      speak(reply.replace(/\[NOTA:.+?\]/s, '').trim());
    }

  } catch (err) {
    hideThinking();
    addBubble('system', `Error: ${err.message}`);
    updateStatus('ready');
  }
}

// ─── Text input ───────────────────────────────────────────
function sendText() {
  const input = document.getElementById('textInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = '';
  sendToClaude(text);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// ─── Voice recording ──────────────────────────────────────
async function toggleRecording() {
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = processAudio;
    mediaRecorder.start();
    isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('micBtn').textContent = '⏹️';
    document.getElementById('micHint').textContent = 'Toca para detener';
    updateStatus('recording');
  } catch (err) {
    addBubble('system', 'No se pudo acceder al micrófono. Permite el acceso en Configuración.');
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
  }
  isRecording = false;
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('micBtn').textContent = '🎙️';
  document.getElementById('micHint').textContent = 'Transcribiendo...';
  updateStatus('thinking', 'Transcribiendo...');
}

async function processAudio() {
  const blob = new Blob(audioChunks, { type: 'audio/webm' });
  const formData = new FormData();
  formData.append('file', blob, 'audio.webm');
  formData.append('model', 'whisper-1');
  formData.append('language', 'es');

  try {
    const openaiKey = localStorage.getItem('asistente_openai') || '';
    // Use OpenAI Whisper
    const resp = await fetch('https://api.openai.com/v1/audio/transcriptions', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${openaiKey}` },
      body: formData
    });
    const data = await resp.json();
    const text = data.text?.trim();
    if (text) {
      document.getElementById('micHint').textContent = 'Mantén presionado para grabar';
      sendToClaude(text);
    } else {
      document.getElementById('micHint').textContent = 'No se entendió. Intenta de nuevo.';
      updateStatus('ready');
      setTimeout(() => { document.getElementById('micHint').textContent = 'Mantén presionado para grabar'; }, 2000);
    }
  } catch(err) {
    // Fallback: use Web Speech API (no OpenAI key needed)
    document.getElementById('micHint').textContent = 'Mantén presionado para grabar';
    addBubble('system', 'Configura tu API key de OpenAI para transcripción de voz, o escribe tu mensaje.');
    updateStatus('ready');
  }
}

// ─── Speech synthesis ─────────────────────────────────────
function speak(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'es-CO';
  utt.rate = 1.05;
  window.speechSynthesis.speak(utt);
}

// ─── Notes ────────────────────────────────────────────────
function saveNote(text, tag = 'manual') {
  const note = {
    id: Date.now(),
    text,
    tag,
    time: new Date().toLocaleString('es-CO', { dateStyle: 'short', timeStyle: 'short' })
  };
  notes.unshift(note);
  localStorage.setItem('asistente_notes', JSON.stringify(notes.slice(0, 100)));
}

function openNotes() {
  renderNotes();
  document.getElementById('notesPanel').classList.add('open');
}
function closeNotes() {
  document.getElementById('notesPanel').classList.remove('open');
}

function renderNotes() {
  const list = document.getElementById('notesList');
  if (notes.length === 0) {
    list.innerHTML = '<div class="empty-notes">No hay notas aún.<br>Dile al asistente que guarde algo.</div>';
    return;
  }
  list.innerHTML = notes.map(n => `
    <div class="note-item">
      <div class="note-time">${n.time}</div>
      <div class="note-text">${n.text}</div>
      <span class="note-tag">${n.tag === 'auto' ? '🤖 auto' : '✏️ manual'}</span>
    </div>
  `).join('');
}

// Add OpenAI key field to settings
document.querySelector('.modal').insertAdjacentHTML('afterbegin', `
  <div id="openaiSection">
    <label>API Key de OpenAI (para transcripción de voz)</label>
    <input type="password" id="openaiKeyInput" placeholder="sk-..." value="${localStorage.getItem('asistente_openai') || ''}" />
  </div>
  <div class="divider"></div>
`);
const origSave = window.saveSettings;
window.saveSettings = function() {
  const ok = document.getElementById('openaiKeyInput').value.trim();
  if (ok) localStorage.setItem('asistente_openai', ok);
  origSave();
};
</script>
</body>
</html>
